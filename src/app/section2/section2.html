<section class="section-2">
 <div class="carrosel">
        <div class="caixa-box-titulo">
            <p class="box-titulo">Categorias</p>
        </div>
        <div class="box-categorias">

            @for (item of tours; track item.texto){

            <div class="{{item.texto.toLowerCase()}}">
                <img class="box-img" src="/categorias/{{item.img}}" alt="imagem de {{item.texto}}">
                    <p class="texto-titulo">{{item.texto}}</p>
                    <button class="btn-comprar">comprar</button>
                
            </div>
            }
        </div>
    </div>


</section>
